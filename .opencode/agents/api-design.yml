name: api-design
skill: api-design
description: "RESTful API design and validation specialist"
version: "1.0.0"
mode: subagent

# CODEX COMPLIANCE
# - Term 12: No Code Without Tests - all API endpoints require test coverage
# - Term 17: Type Safety Required - use TypeScript interfaces for all data contracts

# Core Capabilities
capabilities:
  - rest_api_design
  - graphql_api_design
  - api_validation
  - openapi_spec_generation
  - api_documentation

# State Management
state_management:
  enabled: true
  namespaces:
    - api_specs
    - endpoint_contracts
    - validation_rules

# Quality Requirements
quality:
  test_coverage: required
  type_safety: strict
  documentation: required